worker_processes  auto;
events { worker_connections  4096; }
http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }
  
  upstream game_1 { server game-1:3000; keepalive 32; }
  upstream game_2 { server game-2:3000; keepalive 32; }
  upstream game_3 { server game-3:3000; keepalive 32; }
  
  upstream game_lobby {
    least_conn;
    server game-1:3000 max_fails=3 fail_timeout=10s;
    server game-2:3000 max_fails=3 fail_timeout=10s;
    server game-3:3000 max_fails=3 fail_timeout=10s;
    keepalive 64;
  }
  
  proxy_http_version 1.1;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade           $http_upgrade;
  proxy_set_header Connection        $connection_upgrade;
  proxy_connect_timeout   5s;
  proxy_send_timeout      3600s;
  proxy_read_timeout      3600s;
  server {
    listen 80 default_server;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;
    
    
    
    location = / {
      proxy_pass http://game_lobby;
    }
    
    location = /client/index.html {
      proxy_pass http://game_lobby;
    }
    
    
    location /client/ {
      try_files $uri =404;
      expires 1h;
      add_header Cache-Control "public, max-age=3600";
    }
    location /shared/ {
      try_files $uri =404;
      expires 1h;
      add_header Cache-Control "public, max-age=3600";
    }
    
    
    location = /login    { proxy_pass http://game_lobby; }
    location = /register { proxy_pass http://game_lobby; }
    location = /logout   { proxy_pass http://game_lobby; }
    location = /whoami   { proxy_pass http://game_lobby; }
    
    location = /status {
      proxy_pass http://game_lobby;
    }
    
    location = /health/game-1 { proxy_pass http://game_1/health; }
    location = /health/game-2 { proxy_pass http://game_2/health; }
    location = /health/game-3 { proxy_pass http://game_3/health; }
    
    
    
    location /ws/game-1 { proxy_pass http://game_1; }
    location /ws/game-2 { proxy_pass http://game_2; }
    location /ws/game-3 { proxy_pass http://game_3; }
    
    location /ws {
      proxy_pass http://game_lobby;
    }
  }
}
