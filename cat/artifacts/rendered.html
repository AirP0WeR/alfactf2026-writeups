    <style>
      .boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #dce9ef;
        color: #18201d;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        opacity: 1;
        transition: opacity 220ms ease;
      }

      .boot-loader--hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-loader__box {
        min-width: min(76vw, 320px);
        padding: 22px 24px;
        border: 1px solid rgba(24, 32, 29, 0.16);
        border-radius: 8px;
        background: rgba(252, 253, 247, 0.9);
        text-align: center;
        box-shadow: 0 18px 42px rgba(64, 80, 75, 0.14);
      }

      .boot-loader__title {
        margin: 0 0 12px;
        font-size: 1.18rem;
        font-weight: 900;
      }

      .boot-loader__bar {
        position: relative;
        height: 8px;
        overflow: hidden;
        border-radius: 8px;
        background: rgba(24, 32, 29, 0.12);
      }

      .boot-loader__bar::after {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 42%;
        border-radius: inherit;
        background: #a73d45;
        animation: boot-loader-slide 1.05s ease-in-out infinite;
      }

      @keyframes boot-loader-slide {
        0% {
          transform: translateX(-110%);
        }

        100% {
          transform: translateX(260%);
        }
      }
    </style>

  <body>
    
    <script>
      (() => {
        const timer = window.setInterval(() => {
          const loader = document.getElementById("boot-loader");
          if (!loader) {
            window.clearInterval(timer);
            return;
          }

          const mp3Count = performance
            .getEntriesByType("resource")
            .filter((entry) => entry.name.includes(".mp3")).length;
          if (document.querySelector("canvas") && mp3Count >= 2) {
            loader.classList.add("boot-loader--hidden");
            window.clearInterval(timer);
            window.setTimeout(() => loader.remove(), 260);
          }
        }, 80);
      })();
    </script>
